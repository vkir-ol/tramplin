# Запуск: docker-compose up -d

version: '3.9'

services:
  #  База данных PostgreSQL + PostGIS (для карты в будущем)
  db:
    image: postgis/postgis:16-3.4
    container_name: tramplin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tramplin}
      POSTGRES_USER: ${DB_USER:-tramplin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tramplin_secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tramplin_user} -d ${DB_NAME:-tramplin}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
